<template>
    <article class={cardClass}>
        <div class="slds-card__header slds-grid">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                    <lightning-icon icon-name={weatherIcon} size="medium" alternative-text={condition}></lightning-icon>
                </div>
                <div class="slds-media__body">
                    <h2 class="slds-card__header-title">
                        <span class="slds-text-heading_medium">{city}</span>
                    </h2>
                    <p class="slds-text-body_small slds-text-color_weak">{country}</p>
                </div>
                <div class="slds-no-flex slds-align_absolute-center">
                    <lightning-badge label={condition} class={badgeClass}></lightning-badge>
                </div>
            </header>
        </div>

        <div class="slds-card__body slds-card__body_inner">
            <!-- Temperature Display -->
            <div class="temp-display slds-text-align_center slds-m-bottom_medium">
                <span class="slds-text-heading_large temp-value">{temperature}°</span>
                <span class="slds-text-heading_small temp-unit">C</span>
                <p class="slds-text-body_regular slds-text-color_weak slds-m-top_xx-small">Feels like {feelsLike}°C</p>
            </div>

            <!-- Weather Stats Grid -->
            <div class="slds-grid slds-gutters_small slds-wrap slds-m-bottom_medium">
                <div class="slds-col slds-size_1-of-2">
                    <div class="stat-tile slds-box slds-box_x-small slds-text-align_center">
                        <lightning-icon icon-name="utility:water" size="x-small" alternative-text="Humidity" class="slds-m-bottom_xx-small"></lightning-icon>
                        <p class="slds-text-body_small slds-text-color_weak">Humidity</p>
                        <p class="slds-text-heading_small">{humidity}%</p>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-2">
                    <div class="stat-tile slds-box slds-box_x-small slds-text-align_center">
                        <lightning-icon icon-name="utility:threedots" size="x-small" alternative-text="Wind speed" class="slds-m-bottom_xx-small"></lightning-icon>
                        <p class="slds-text-body_small slds-text-color_weak">Wind</p>
                        <p class="slds-text-heading_small">{windSpeed} km/h</p>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-m-top_small">
                    <div class="stat-tile slds-box slds-box_x-small slds-text-align_center">
                        <lightning-icon icon-name="utility:up" size="x-small" alternative-text="Daily high temperature" class="slds-m-bottom_xx-small"></lightning-icon>
                        <p class="slds-text-body_small slds-text-color_weak">High</p>
                        <p class="slds-text-heading_small">{high}°C</p>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-2 slds-m-top_small">
                    <div class="stat-tile slds-box slds-box_x-small slds-text-align_center">
                        <lightning-icon icon-name="utility:down" size="x-small" alternative-text="Daily low temperature" class="slds-m-bottom_xx-small"></lightning-icon>
                        <p class="slds-text-body_small slds-text-color_weak">Low</p>
                        <p class="slds-text-heading_small">{low}°C</p>
                    </div>
                </div>
            </div>

            <!-- UV Index Progress Bar -->
            <div class="slds-m-bottom_small">
                <div class="slds-grid slds-grid_align-spread slds-m-bottom_xx-small">
                    <span class="slds-text-body_small slds-text-color_weak">UV Index</span>
                    <span class="slds-text-body_small">{uvIndex}</span>
                </div>
                <div class="slds-progress-bar slds-progress-bar_circular" role="progressbar"
                    aria-valuenow={uvPercent} aria-valuemin="0" aria-valuemax="100">
                    <span class={uvBarClass} style={uvBarStyle}></span>
                </div>
            </div>

            <!-- Local Time -->
            <div class="slds-grid slds-grid_align-spread slds-m-top_small">
                <span class="slds-text-body_small slds-text-color_weak">
                    <lightning-icon icon-name="utility:clock" size="xx-small" alternative-text="Local time" class="slds-m-right_xx-small"></lightning-icon>
                    Local Time
                </span>
                <span class="slds-text-body_small slds-text-title_caps">{localTime}</span>
            </div>
        </div>

        <footer class="slds-card__footer">
            <span class="slds-text-body_small slds-text-color_weak">Last updated: {lastUpdated}</span>
        </footer>
    </article>
</template>
